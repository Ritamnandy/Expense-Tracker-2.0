
services:

  redis:
    image: redis:7-alpine
    container_name: redis-expense
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data


  mongo:
    image: mongo:7
    container_name: mongo-expense
    ports:  
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db  



volumes:
  redis-data:
    external: true
  mongodb-data:
    external: true